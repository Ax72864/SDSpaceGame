<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>星环工站 - WebGL Prototype</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <section class="panel topbar">
      <div>
        <strong>星环工站</strong>
        <span id="runInfo">准备中</span>
      </div>
      <div id="resources"></div>
      <button id="pauseBtn" type="button">暂停</button>
    </section>

    <section class="panel build-panel">
      <h2>建造</h2>
      <div id="buildButtons" class="button-grid"></div>
      <div class="hint">
        点击设施后点空间站网格建造。拖动画面旋转空间站，空白处点击设定移动目的地。方向键/WASD 可移动虚拟指针，Enter 确认。
      </div>
    </section>

    <section class="panel status-panel">
      <h2>状态</h2>
      <div id="objective"></div>
      <div id="stationStatus">
        <div id="stationData"></div>
        <div id="selectedCellPanel" class="selected-panel hidden">
          <div id="selectedCellInfo"></div>
          <div class="row">
            <button id="toggleSelectedBtn" type="button">开关设施</button>
            <button id="prioritySelectedBtn" type="button">优先级+10</button>
          </div>
        </div>
      </div>
      <div class="row">
        <button id="missileBtn" type="button">导弹齐射</button>
        <button id="toggleAsyncBtn" type="button">异步敌站: 开</button>
      </div>
      <div class="row">
        <button id="rotateLeftBtn" type="button">左旋</button>
        <button id="rotateRightBtn" type="button">右旋</button>
      </div>
      <h2>局外天赋</h2>
      <div id="meta">
        <div id="metaStats"></div>
        <div class="meta-actions">
          <button id="talentMiningBtn" type="button">采集升级 1点</button>
          <button id="talentHullBtn" type="button">结构升级 1点</button>
          <button id="talentWeaponsBtn" type="button">武器升级 1点</button>
          <button id="unlockCoreBtn" type="button">改造: 高效核心 3点</button>
          <button id="unlockWeaponFrameBtn" type="button">解锁: 武器框架 3点</button>
          <button id="playersBtn" type="button">联机人数缩放</button>
        </div>
      </div>
    </section>

    <section id="toast" class="toast"></section>
  </div>

  <script src="game.js"></script>
</body>
</html>
